<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#071117" />
    <title>Evolve Kiosk | Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-deep: #040b10;
        --bg: #071117;
        --surface: rgba(17, 28, 35, 0.96);
        --border: rgba(200, 169, 108, 0.2);
        --gold: #c8a96c;
        --gold-bright: #f3e0b6;
        --text-primary: #f7f1e6;
        --text-secondary: #c8ba9d;
        --text-muted: #8e816d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(106, 166, 154, 0.18), transparent 32%),
          radial-gradient(circle at top right, rgba(243, 224, 182, 0.12), transparent 28%),
          linear-gradient(145deg, var(--bg-deep), var(--bg));
        color: var(--text-primary);
      }

      main {
        width: min(100%, 560px);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 32px 28px;
        text-align: center;
        background: linear-gradient(160deg, rgba(17, 28, 35, 0.96), rgba(8, 15, 20, 0.94));
        box-shadow: 0 32px 120px rgba(0, 0, 0, 0.42);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 7vw, 54px);
        line-height: 0.95;
        letter-spacing: 0.04em;
      }

      p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 16px;
        line-height: 1.7;
      }

      .eyebrow {
        margin-bottom: 16px;
        color: var(--gold-bright);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .note {
        margin-top: 18px;
        color: var(--text-muted);
        font-size: 14px;
      }

      button {
        margin-top: 28px;
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 16px 20px;
        cursor: pointer;
        color: #1a140d;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 45%, #d7b57a 100%);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Evolve Kiosk Offline</div>
      <h1>Connection Lost.</h1>
      <p>
        The app shell is available offline, but live member lookup, payments, and
        fresh data still need an internet connection.
      </p>
      <p class="note">
        Reconnect to continue exactly where you left off.
      </p>
      <button type="button" onclick="window.location.reload()">
        Try Again
      </button>
    </main>
  </body>
</html>
